<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0D1B2A;color:#fff;font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#0D1B2A}

/* HEADER */
.header{background:#132233;padding:14px 16px 12px;text-align:center;border-bottom:3px solid #E8751A;position:relative}
.nrl-badge{display:inline-block;background:#E8751A;color:#fff;font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:11px;letter-spacing:3px;padding:3px 10px;border-radius:3px;margin-bottom:6px}
.header-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:32px;color:#E8751A;letter-spacing:2px;line-height:1}
.header-sub{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:13px;color:#F5A623;letter-spacing:3px;margin-top:3px}
.header-detail{font-size:10px;color:#6B8CA8;margin-top:3px;letter-spacing:1px}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:6px;vertical-align:middle}
.sync-dot.online{background:#2ECC71}
.sync-dot.offline{background:#E74C3C}
.sync-dot.syncing{background:#F5A623;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* NAV */
.nav{display:flex;background:#132233;border-bottom:1px solid #1A2E42;position:sticky;top:0;z-index:100;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:60px;padding:10px 2px;border:none;background:transparent;color:#6B8CA8;font-size:10px;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;letter-spacing:0.5px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.nav-btn.active{background:#E8751A;color:#0D1B2A}

/* PAGE */
.page{padding:14px 14px 90px;display:none}
.page.active{display:block}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#132233;border:1px solid #E8751A;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* LOADING */
.loading{text-align:center;padding:40px 20px;color:#6B8CA8;font-size:14px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #1A2E42;border-top-color:#E8751A;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat-card{background:#1A2E42;border:1.5px solid #E8751A;border-radius:10px;padding:10px 12px}
.stat-label{font-size:9px;font-weight:700;color:#6B8CA8;letter-spacing:1.5px;font-family:‘Barlow Condensed’,sans-serif;text-transform:uppercase;margin-bottom:4px}
.stat-value{font-size:18px;font-weight:800;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:0.5px;line-height:1}

/* TABLE */
.table-wrap{border-radius:10px;overflow:hidden;border:1px solid #1A2E42}
.table-head{background:#132233;padding:8px 10px;display:grid;gap:4px}
.table-head-cell{font-size:10px;font-weight:700;color:#F5A623;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:1px;text-align:center}
.table-row{padding:9px 10px;display:grid;gap:4px;align-items:center}
.table-row:nth-child(even){background:#132233}
.table-row:nth-child(odd){background:#1A2E42}

/* WEEK SELECTOR */
.week-selector{background:#132233;border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid #1A2E42}
.week-nav{display:flex;align-items:center;gap:10px}
.week-btn{background:#1A2E42;border:1px solid #E8751A;color:#E8751A;border-radius:8px;width:44px;height:44px;font-size:22px;cursor:pointer;font-weight:700;flex-shrink:0}
.week-num-big{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:40px;color:#F5A623;line-height:1}
.week-date-txt{font-size:12px;color:#6B8CA8;margin-top:2px}
.punter-badge{display:inline-flex;align-items:center;gap:6px;background:#1A2E42;border-radius:20px;padding:5px 14px;margin-top:6px}

/* INPUTS */
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.input-card{background:#132233;border-radius:10px;padding:12px;border:1px solid #1A2E42}
.input-card.bonus{border-color:#F5A623;background:#1C1A00}
.input-name{font-size:10px;font-weight:700;color:#6B8CA8;letter-spacing:1.5px;font-family:‘Barlow Condensed’,sans-serif;text-transform:uppercase;margin-bottom:6px}

.input-wrap{position:relative}
.input-dollar{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#6B8CA8;font-size:14px;font-weight:600;pointer-events:none}
.input-field{background:#0D2A4A;border:2px solid #E8751A;border-radius:8px;color:#fff;font-size:17px;font-family:‘Barlow’,sans-serif;font-weight:600;text-align:center;width:100%;padding:10px 6px 10px 24px;outline:none}
.input-field:focus{border-color:#F5A623;background:#1A3A5A}
.input-field.profit{background:#1A4A2A;border-color:#2ECC71;color:#2ECC71}
.input-field.loss{background:#4A1A1A;border-color:#E74C3C;color:#E74C3C}

/* RESULT */

.result-big{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:44px;line-height:1}
.bonus-alert{background:#1C1A00;border:2px solid #F5A623;border-radius:8px;padding:10px 12px;margin-top:8px}

/* LB */
.lb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.lb-card{border-radius:12px;padding:14px;border:2px solid}

.mini-stat-label{font-size:8px;color:#6B8CA8;font-weight:700;font-family:‘Barlow Condensed’,sans-serif;text-transform:uppercase}
.mini-stat-value{font-size:12px;font-weight:700;margin-top:1px}

/* PROGRESS */
.progress-wrap{background:#132233;border-radius:99px;height:10px;overflow:hidden;margin:8px 0}
.progress-bar{background:linear-gradient(90deg,#E8751A,#F5A623);height:100%;border-radius:99px;transition:width 0.6s ease}

/* BUTTONS */
.copy-btn{background:#2ECC71;color:#0D1B2A;border:none;border-radius:10px;font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:18px;padding:15px 0;width:100%;cursor:pointer;letter-spacing:1px;margin-bottom:14px;transition:all 0.15s}
.copy-btn.copied{background:#F5A623}
.clear-btn{width:100%;padding:12px 0;background:transparent;border:1px solid #1A2E42;border-radius:10px;color:#6B8CA8;font-size:13px;cursor:pointer;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;margin-top:4px}
.save-btn{width:100%;padding:14px 0;background:#E8751A;color:#0D1B2A;border:none;border-radius:10px;font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:18px;cursor:pointer;letter-spacing:1px;margin-bottom:10px}

/* RULES TAB */
.rule-card{background:#132233;border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid #E8751A}
.rule-num{display:inline-block;background:#E8751A;color:#0D1B2A;font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:13px;width:26px;height:26px;border-radius:50%;text-align:center;line-height:26px;margin-right:8px;flex-shrink:0}
.rule-text{font-size:13px;color:#D9E8F5;line-height:1.5}
.rule-highlight{color:#F5A623;font-weight:700}
.rules-header{background:linear-gradient(135deg,#132233,#1A2E42);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center;border:1px solid #E8751A}

/* WA */
.wa-preview{background:#0A1E0A;border:1.5px solid #2ECC71;border-radius:12px;padding:16px;font-family:monospace;font-size:13px;line-height:1.7;color:#2ECC71;white-space:pre-wrap;word-break:break-word}

/* UTILS */
.profit{color:#2ECC71!important}
.loss{color:#E74C3C!important}
.amber{color:#F5A623}
.muted{color:#6B8CA8}
.divider{height:1px;background:linear-gradient(90deg,transparent,#E8751A44,transparent);margin:14px 0}
.section-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#E8751A;font-size:13px;margin-bottom:10px}
.wk-badge{background:#E8751A;color:#0D1B2A;border-radius:6px;font-weight:900;font-family:‘Barlow Condensed’,sans-serif;width:32px;text-align:center;padding:3px 0;flex-shrink:0;font-size:11px}
.tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.tag-amber{background:#2A1800;color:#F5A623}
.tag-muted{background:#132233;color:#6B8CA8}
.tag-green{background:#1A4A2A;color:#2ECC71}
.tip-box{background:#1A2E42;border-radius:10px;padding:12px;margin-top:12px}
.bonus-box{background:#1A2800;border:1.5px solid #F5A623;border-radius:10px;padding:14px}
</style>

<script>
// ── CONFIG ───────────────────────────────────────────────────────
const SUPABASE_URL = "https://ndsbuovvckxglbgptymc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kc2J1b3Z2Y2t4Z2xiZ3B0eW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjM4MzMsImV4cCI6MjA5MjUzOTgzM30.dQ6TW7ViK6tFIk7duSf0SENC2BvGzkGaDwgtGnzuzbY";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CONSTANTS ────────────────────────────────────────────────────
const PUNTERS  = ["Matt","Hamish","Sean","Jamie"];
const PCOLS    = ["matt","hamish","sean","jamie"];
const WEEKS    = 56;
const COLLECT  = 400;   // total collected per week
const POOL     = 200;   // amount bet each week per punter-in-charge
const AUTO_BANK = 200;  // always banked no matter what
const BONUS_TRIGGER = 600; // return needed to bet again
const BONUS_KEEP    = 200; // amount kept to bet again
const START    = new Date("2026-04-06");
const MEDALS   = ["🥇","🥈","🥉","☠️"];

const DATES = Array.from({length:WEEKS},(_,i)=>{
  const d=new Date(START); d.setDate(d.getDate()+i*7);
  return d.toLocaleDateString("en-AU",{day:"2-digit",month:"short"});
});
const ROTATION = Array.from({length:WEEKS},(_,i)=>PUNTERS[i%4]);

// ── STATE ────────────────────────────────────────────────────────
// results[week] = { returns: [matt,hamish,sean,jamie], bonusPunter: name|null, bonusReturn: number|null }
let results = {};
let currentEntryWeek = 1;
let currentWAWeek    = 1;
let activeTab        = "dashboard";

// ── SUPABASE ─────────────────────────────────────────────────────
function setSyncStatus(s){
  const dot=document.getElementById("sync-dot");
  if(dot) dot.className="sync-dot "+s;
}

async function loadFromDB(){
  setSyncStatus("syncing");
  try {
    const {data,error}=await db.from("results").select("*");
    if(error) throw error;
    results={};
    (data||[]).forEach(row=>{
      results[row.week]={
        returns: PCOLS.map(c=>row[c]),
        bonusPunter: row.bonus_punter||null,
        bonusReturn: row.bonus_return||null
      };
    });
    setSyncStatus("online");
  } catch(e){
    console.error(e);
    setSyncStatus("offline");
    showToast("⚠️ Offline — saved locally");
    try{ const r=localStorage.getItem("pc26"); if(r) results=JSON.parse(r); }catch{}
  }
}

async function saveWeekToDB(week){
  setSyncStatus("syncing");
  const w=results[week]||{returns:[null,null,null,null],bonusPunter:null,bonusReturn:null};
  const row={
    week,
    matt:w.returns[0], hamish:w.returns[1], sean:w.returns[2], jamie:w.returns[3],
    bonus_punter:w.bonusPunter||null,
    bonus_return:w.bonusReturn||null,
    updated_at:new Date().toISOString()
  };
  try {
    const {error}=await db.from("results").upsert(row);
    if(error) throw error;
    setSyncStatus("online");
    showToast("✅ Saved & synced!");
    try{ localStorage.setItem("pc26",JSON.stringify(results)); }catch{}
  } catch(e){
    console.error(e);
    setSyncStatus("offline");
    showToast("⚠️ Saved locally");
    try{ localStorage.setItem("pc26",JSON.stringify(results)); }catch{}
  }
}

async function deleteWeekFromDB(week){
  try {
    await db.from("results").delete().eq("week",week);
    showToast("🗑️ Week cleared");
  } catch(e){ showToast("Cleared locally"); }
}

function subscribeToChanges(){
  db.channel("results-live")
    .on("postgres_changes",{event:"*",schema:"public",table:"results"},async()=>{
      await loadFromDB();
      renderActiveTab();
      showToast("🔄 Updated!");
    }).subscribe();
}

// ── HELPERS ──────────────────────────────────────────────────────
function fmt$(n,sign=false){
  if(n===null||n===undefined||n==="")return"—";
  const a=Math.abs(Number(n)).toFixed(2);
  if(sign)return Number(n)>=0?`+$${a}`:`-$${a}`;
  return`$${a}`;
}
function fmtPct(n){return isNaN(n)||n===null?"—":`${Math.round(n*100)}%`;}

function isComplete(wk){
  const w=results[wk];
  if(!w)return false;
  return PUNTERS.every((_,i)=>w.returns[i]!==null&&w.returns[i]!==undefined&&w.returns[i]!=="");
}

// Calculate how much gets banked for a given week
function calcBanked(wk){
  if(!isComplete(wk))return 0;
  const w=results[wk];
  const ret=w.returns.reduce((a,b)=>a+Number(b),0);
  // Always bank AUTO_BANK ($200) plus whatever is returned
  // If bonus triggered, $200 held back for next week bet
  let banked = AUTO_BANK + ret;
  if(ret >= BONUS_TRIGGER) banked = AUTO_BANK + ret - BONUS_KEEP;
  // Also add bonus punter return if applicable
  if(w.bonusReturn!==null&&w.bonusReturn!==undefined&&w.bonusReturn!==""){
    const br=Number(w.bonusReturn);
    if(br>=BONUS_TRIGGER) banked += br - BONUS_KEEP;
    else banked += br;
  }
  return banked;
}

function getTotalBanked(){
  return Array.from({length:WEEKS},(_,i)=>i+1)
    .filter(wk=>isComplete(wk))
    .reduce((a,wk)=>a+calcBanked(wk),0);
}

function calcStats(){
  return PUNTERS.map((name,pi)=>{
    const weekReturns=[];
    Object.keys(results).forEach(wk=>{
      if(!isComplete(Number(wk)))return;
      const w=results[wk];
      if(w.returns[pi]!==null&&w.returns[pi]!==undefined&&w.returns[pi]!==""){
        weekReturns.push({ret:Number(w.returns[pi]),staked:POOL});
      }
      // bonus punter
      if(w.bonusPunter===name&&w.bonusReturn!==null&&w.bonusReturn!==undefined&&w.bonusReturn!==""){
        weekReturns.push({ret:Number(w.bonusReturn),staked:POOL});
      }
    });
    const weeks=weekReturns.length;
    const staked=weekReturns.reduce((a,b)=>a+b.staked,0);
    const totalReturn=weekReturns.reduce((a,b)=>a+b.ret,0);
    const pnl=totalReturn-staked;
    const best=weeks?Math.max(...weekReturns.map(r=>r.ret-r.staked)):0;
    const winRate=weeks?weekReturns.filter(r=>r.ret>r.staked).length/weeks:0;
    return{name,pi,weeks,staked,totalReturn,pnl,best,winRate};
  });
}

function rankStats(stats){
  const sorted=[...stats].sort((a,b)=>b.pnl-a.pnl);
  return stats.map(s=>({...s,rank:sorted.findIndex(x=>x.name===s.name)+1}));
}

function getWeeksPlayed(){
  return Array.from({length:WEEKS},(_,i)=>i+1).filter(wk=>isComplete(wk)).length;
}

// Who is the current bonus punter? Check last completed week
function getCurrentBonusPunter(){
  const completed=Array.from({length:WEEKS},(_,i)=>i+1).filter(wk=>isComplete(wk));
  if(completed.length===0)return null;
  const lastWk=completed[completed.length-1];
  const w=results[lastWk];
  // Check if last week's punter or bonus punter triggered bonus
  const ret=w.returns.reduce((a,b)=>a+Number(b),0);
  if(ret>=BONUS_TRIGGER) return ROTATION[lastWk-1];
  if(w.bonusReturn!==null&&Number(w.bonusReturn)>=BONUS_TRIGGER) return w.bonusPunter;
  return null;
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

// ── TAB ──────────────────────────────────────────────────────────
function showTab(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  activeTab=id;
  renderActiveTab();
}

function renderActiveTab(){
  if(activeTab==="dashboard")renderDashboard();
  if(activeTab==="entry")renderEntry();
  if(activeTab==="leaderboard")renderLeaderboard();
  if(activeTab==="whatsapp")renderWhatsApp();
  if(activeTab==="rules")renderRules();
}

// ── DASHBOARD ────────────────────────────────────────────────────
function renderDashboard(){
  const stats=rankStats(calcStats());
  const wp=getWeeksPlayed();
  const totalBanked=getTotalBanked();
  const leader=stats.find(s=>s.rank===1);
  const loser=stats.find(s=>s.rank===4);
  const completed=Array.from({length:WEEKS},(_,i)=>i+1).filter(wk=>isComplete(wk));
  const lastWk=completed.length>0?completed[completed.length-1]:null;
  const lastBanked=lastWk?calcBanked(lastWk):null;
  const bonusPunter=getCurrentBonusPunter();
  const minFund=wp*AUTO_BANK;

  document.getElementById("tab-dashboard").innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">CURRENT LEADER</div>
        <div class="stat-value amber">${leader?.weeks>0?leader.name:"TBD"}</div></div>
      <div class="stat-card"><div class="stat-label">IN DANGER ☠</div>
        <div class="stat-value loss">${loser?.weeks>0?loser.name:"TBD"}</div></div>
      <div class="stat-card"><div class="stat-label">LEADING P&L</div>
        <div class="stat-value ${leader?.weeks>0?(leader.pnl>=0?"profit":"loss"):""}">${leader?.weeks>0?fmt$(leader.pnl,true):"—"}</div></div>
      <div class="stat-card"><div class="stat-label">WEEKS PLAYED</div>
        <div class="stat-value amber">${wp} / 56</div></div>
      <div class="stat-card"><div class="stat-label">TRIP KITTY 🎒</div>
        <div class="stat-value profit">$${Math.round(totalBanked).toLocaleString()}</div></div>

// ── ENTRY ────────────────────────────────────────────────────────
function renderEntry(){
  const weekData=results[currentEntryWeek]||{returns:[null,null,null,null],bonusPunter:null,bonusReturn:null};

  // Figure out if there's a bonus punter this week
  // (someone from previous week who hit 600+)
  let expectedBonusPunter=null;
  if(currentEntryWeek>1){
    const prevWk=currentEntryWeek-1;
    const prev=results[prevWk];
    if(prev&&isComplete(prevWk)){
      const prevRet=prev.returns.reduce((a,b)=>a+Number(b),0);
      if(prevRet>=BONUS_TRIGGER) expectedBonusPunter=ROTATION[prevWk-1];
      else if(prev.bonusReturn!==null&&Number(prev.bonusReturn)>=BONUS_TRIGGER) expectedBonusPunter=prev.bonusPunter;
    }
  }

  const complete=isComplete(currentEntryWeek);
  const totalReturn=complete?weekData.returns.reduce((a,b)=>a+Number(b),0):null;
  const hasBonus=expectedBonusPunter!==null;
  const bonusRet=weekData.bonusReturn;
  const bonusComplete=!hasBonus||(bonusRet!==null&&bonusRet!==undefined&&bonusRet!=="");
  const allComplete=complete&&bonusComplete;

  let bankedThisWeek=null;
  if(allComplete){
    bankedThisWeek=calcBanked(currentEntryWeek);
  }

  const allWeeksHTML=Array.from({length:WEEKS},(_,i)=>i+1).map(wk=>{
    const w=results[wk];
    const comp=isComplete(wk);
    const ret=comp?results[wk].returns.reduce((a,b)=>a+Number(b),0):null;
    const banked=comp?calcBanked(wk):null;
    const isCur=wk===currentEntryWeek;
    return`<div class="table-row" onclick="jumpToWeek(${wk})"
      style="grid-template-columns:28px 48px 1fr 60px 62px;cursor:pointer;${isCur?"outline:2px solid #E8751A;outline-offset:-2px;":""}">
      <div class="wk-badge">${wk}</div>
      <div style="font-size:10px;color:#D9E8F5;text-align:center">${DATES[wk-1]}</div>
      <div style="font-size:11px;font-weight:600;color:${isCur?"#F5A623":"#D9E8F5"}">${ROTATION[wk-1]}</div>
      <div style="font-size:11px;text-align:center">${ret!==null?fmt$(ret):"—"}</div>
      <div style="font-size:12px;font-weight:700;text-align:center" class="${banked!==null?"profit":""}">${banked!==null?"$"+Math.round(banked).toLocaleString():"—"}</div>
    </div>`;
  }).join("");

  document.getElementById("tab-entry").innerHTML=`
    <div class="week-selector">
      <div class="section-title" style="margin-bottom:10px">Select Week</div>
      <div class="week-nav">
        <button class="week-btn" onclick="changeWeek(-1)">‹</button>
        <div style="flex:1;text-align:center">
          <div class="week-num-big">WK ${currentEntryWeek}</div>
          <div class="week-date-txt">${DATES[currentEntryWeek-1]}</div>
        </div>
        <button class="week-btn" onclick="changeWeek(1)">›</button>
      </div>
      <div style="text-align:center">
        <div class="punter-badge">
          <span style="font-size:11px;color:#6B8CA8">Punter:</span>
          <span style="font-size:14px;font-weight:700;color:#F5A623;font-family:'Barlow Condensed',sans-serif">${ROTATION[currentEntryWeek-1]}</span>
        </div>
        ${hasBonus?`<div style="display:inline-flex;align-items:center;gap:6px;background:#1C1A00;border-radius:20px;padding:5px 14px;margin-top:6px;border:1px solid #F5A623">
          <span style="font-size:11px;color:#F5A623">⚡ Bonus:</span>
          <span style="font-size:14px;font-weight:700;color:#F5A623;font-family:'Barlow Condensed',sans-serif">${expectedBonusPunter}</span>
        </div>`:""}
      </div>
    </div>

    <div class="section-title">💰 Enter Returns ($200 bet → how much returned?)</div>
    <div class="input-grid">
      ${PUNTERS.map((name,pi)=>{
        const val=weekData.returns[pi];
        const hasVal=val!==null&&val!==undefined&&val!=="";
        const isP=hasVal&&Number(val)>POOL;
        return`<div class="input-card">
          <div class="input-name">${name}</div>
          <div class="input-wrap">
            <span class="input-dollar">$</span>
            <input type="number" class="input-field ${hasVal?(isP?"profit":"loss"):""}"
              id="input-${pi}" placeholder="0.00" value="${hasVal?Number(val):""}"
              step="0.01" min="0" inputmode="decimal" oninput="updateVal(${pi},this.value)">
          </div>
          <div class="input-pnl ${hasVal?(isP?"profit":"loss"):""}" id="pnl-${pi}">
            ${hasVal?(isP?`+$${(Number(val)-POOL).toFixed(2)} ✅`:`-$${(POOL-Number(val)).toFixed(2)} ❌`):""}
          </div>
        </div>`;
      }).join("")}
    </div>

    ${hasBonus?`

    <div style="margin-bottom:14px">

            id="input-bonus" placeholder="0.00" value="${bonusRet!==null&&bonusRet!==undefined&&bonusRet!==""?Number(bonusRet):""}"

        <div class="input-pnl ${bonusRet!==null&&bonusRet!==undefined&&bonusRet!==""?(Number(bonusRet)>POOL?"profit":"loss"):""}" id="pnl-bonus">
          ${bonusRet!==null&&bonusRet!==undefined&&bonusRet!==""?(Number(bonusRet)>POOL?`+$${(Number(bonusRet)-POOL).toFixed(2)} ✅`:`-$${(POOL-Number(bonusRet)).toFixed(2)} ❌`):""}
        </div>
      </div>
    </div>`:""}

    ${allComplete?`
    <div class="result-box" style="background:${bankedThisWeek>AUTO_BANK?"#1A4A2A":"#1A2E42"};border-color:${bankedThisWeek>AUTO_BANK?"#2ECC71":"#E8751A"}">
      <div style="font-size:11px;font-weight:600;letter-spacing:1px;color:#6B8CA8;margin-bottom:4px">WEEK ${currentEntryWeek} — TRIP KITTY</div>
      <div class="result-big profit">$${Math.round(bankedThisWeek).toLocaleString()}</div>
      <div style="font-size:12px;margin-top:4px;color:#6B8CA8">banked this week</div>
      <div style="display:flex;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap">
        <span class="tag tag-muted">$200 guaranteed</span>
        ${bankedThisWeek>AUTO_BANK?`<span class="tag tag-green">+$${Math.round(bankedThisWeek-AUTO_BANK).toLocaleString()} winnings</span>`:""}
      </div>
      ${totalReturn>=BONUS_TRIGGER?`<div class="bonus-alert">
        <div style="color:#F5A623;font-weight:800;font-size:14px;font-family:'Barlow Condensed',sans-serif">⚡ BONUS TRIGGERED!</div>
        <div style="color:#D9E8F5;font-size:11px;margin-top:2px">${ROTATION[currentEntryWeek-1]} bets again next week!</div>
      </div>`:""}
      ${hasBonus&&bonusRet!==null&&Number(bonusRet)>=BONUS_TRIGGER?`<div class="bonus-alert" style="margin-top:6px">
        <div style="color:#F5A623;font-weight:800;font-size:14px;font-family:'Barlow Condensed',sans-serif">⚡ BONUS CONTINUES!</div>
        <div style="color:#D9E8F5;font-size:11px;margin-top:2px">${expectedBonusPunter} bets AGAIN next week!</div>
      </div>`:""}
    </div>`:""}

    <button class="save-btn" onclick="saveWeek()">💾 SAVE WEEK ${currentEntryWeek}</button>
    <button class="clear-btn" onclick="clearWeek()">Clear Week ${currentEntryWeek}</button>

    <div class="divider"></div>
    <div class="section-title">Season Overview</div>
    <div class="table-wrap">
      <div class="table-head" style="grid-template-columns:28px 48px 1fr 60px 62px">
        <div class="table-head-cell">WK</div>
        <div class="table-head-cell">DATE</div>
        <div class="table-head-cell" style="text-align:left">WHO</div>
        <div class="table-head-cell">RETURN</div>
        <div class="table-head-cell">BANKED</div>
      </div>
      ${allWeeksHTML}
    </div>`;
}

function updateVal(pi,val){
  if(!results[currentEntryWeek]) results[currentEntryWeek]={returns:[null,null,null,null],bonusPunter:null,bonusReturn:null};
  results[currentEntryWeek].returns[pi]=val===""?null:Number(val);
  const input=document.getElementById("input-"+pi);
  const pnlEl=document.getElementById("pnl-"+pi);
  const hasVal=val!=="";
  const isP=hasVal&&Number(val)>POOL;
  if(input) input.className="input-field "+(hasVal?(isP?"profit":"loss"):"");
  if(pnlEl){
    pnlEl.className="input-pnl "+(hasVal?(isP?"profit":"loss"):"");
    pnlEl.textContent=hasVal?(isP?`+$${(Number(val)-POOL).toFixed(2)} ✅`:`-$${(POOL-Number(val)).toFixed(2)} ❌`):"";
  }
}

function updateBonusVal(val,punterName){
  if(!results[currentEntryWeek]) results[currentEntryWeek]={returns:[null,null,null,null],bonusPunter:null,bonusReturn:null};
  results[currentEntryWeek].bonusPunter=punterName;
  results[currentEntryWeek].bonusReturn=val===""?null:Number(val);
  const input=document.getElementById("input-bonus");
  const pnlEl=document.getElementById("pnl-bonus");
  const hasVal=val!=="";
  const isP=hasVal&&Number(val)>POOL;
  if(input) input.className="input-field "+(hasVal?(isP?"profit":"loss"):"");
  if(pnlEl){
    pnlEl.className="input-pnl "+(hasVal?(isP?"profit":"loss"):"");
    pnlEl.textContent=hasVal?(isP?`+$${(Number(val)-POOL).toFixed(2)} ✅`:`-$${(POOL-Number(val)).toFixed(2)} ❌`):"";
  }
}

async function saveWeek(){ await saveWeekToDB(currentEntryWeek); }

function changeWeek(dir){
  currentEntryWeek=Math.max(1,Math.min(WEEKS,currentEntryWeek+dir));
  renderEntry();
  document.getElementById("tab-entry").scrollTop=0;
}

function jumpToWeek(wk){
  currentEntryWeek=wk;
  renderEntry();
  document.getElementById("tab-entry").scrollTop=0;
}

async function clearWeek(){
  delete results[currentEntryWeek];
  await deleteWeekFromDB(currentEntryWeek);
  renderEntry();
}

function buildMessage(){
  const stats=rankStats(calcStats()).sort((a,b)=>a.rank-b.rank);
  const w=results[currentWAWeek];
  const complete=isComplete(currentWAWeek);
  const totalReturn=complete?w.returns.reduce((a,b)=>a+Number(b),0):null;
  const banked=complete?calcBanked(currentWAWeek):null;
  const totalBanked=getTotalBanked();
  const lines=[
    `🏉 PUNTERS CLUB — WEEK ${currentWAWeek} 🏉`,
    `NRL PREMIERSHIP 2026`,
    `━━━━━━━━━━━━━━━━━━`,
    `📅 ${DATES[currentWAWeek-1]}`,
    `🎯 Punter: ${ROTATION[currentWAWeek-1]}`,
  ];
  if(w?.bonusPunter) lines.push(`⚡ Bonus: ${w.bonusPunter}`);
  lines.push(`━━━━━━━━━━━━━━━━━━`,`💰 RETURNS:`);
  PUNTERS.forEach((name,i)=>{
    const val=w?.returns[i];
    const hasVal=val!==null&&val!==undefined&&val!=="";
    lines.push(`  ${name}: ${hasVal?`$${Number(val).toFixed(2)} ${Number(val)>POOL?"✅":"❌"}`:"—"}`);
  });
  if(w?.bonusPunter&&w?.bonusReturn!==null&&w?.bonusReturn!==undefined&&w?.bonusReturn!==""){
    lines.push(`  ⚡ ${w.bonusPunter} (bonus): $${Number(w.bonusReturn).toFixed(2)} ${Number(w.bonusReturn)>POOL?"✅":"❌"}`);
  }
  lines.push(`━━━━━━━━━━━━━━━━━━`);
  if(totalReturn!==null){
    lines.push(`📊 Return: $${totalReturn.toFixed(2)}`);
    lines.push(`🎒 Banked this week: $${Math.round(banked).toLocaleString()}`);
    if(totalReturn>=BONUS_TRIGGER) lines.push(`⚡ ${ROTATION[currentWAWeek-1]} BETS AGAIN next week!`);
  }
  lines.push(`━━━━━━━━━━━━━━━━━━`,`🏆 STANDINGS:`);
  stats.forEach(s=>{
    const pre=s.rank===4?"  ☠️":`  ${s.rank}.`;
    const p=s.weeks>0?` (${s.pnl>=0?"+":""}$${s.pnl.toFixed(2)})`:"";
    lines.push(`${pre} ${s.name}${p}${s.rank===4&&s.weeks>0?" 👀":""}`);
  });
  lines.push(`━━━━━━━━━━━━━━━━━━`);
  lines.push(`🎒 Trip kitty: $${Math.round(totalBanked).toLocaleString()}`);
  lines.push(`📆 ${WEEKS-currentWAWeek} weeks to Brisbane! 🍺🏉`);
  return lines.join("\n");
}

function renderWhatsApp(){
  const complete=isComplete(currentWAWeek);
  document.getElementById("tab-whatsapp").innerHTML=`
    <div class="week-selector">
      <div class="section-title" style="margin-bottom:10px">Select Week to Share</div>
      <div class="week-nav">
        <button class="week-btn" onclick="changeWAWeek(-1)">‹</button>
        <div style="flex:1;text-align:center">
          <div class="week-num-big">WK ${currentWAWeek}</div>
          <div class="week-date-txt">${complete?"✅ Results entered":"⏳ No results yet"}</div>
        </div>
        <button class="week-btn" onclick="changeWAWeek(1)">›</button>
      </div>
    </div>
    <button class="copy-btn" id="copy-btn" onclick="copyMessage()">📋 COPY MESSAGE</button>
    <div class="section-title">Message Preview</div>
    <div class="wa-preview">${buildMessage()}</div>
    <div class="tip-box">
      <div style="font-size:11px;color:#6B8CA8;line-height:1.5">💡 Enter results → Save → come here → Copy → paste into WhatsApp group.</div>
    </div>`;
}

function changeWAWeek(dir){
  currentWAWeek=Math.max(1,Math.min(WEEKS,currentWAWeek+dir));
  renderWhatsApp();
}

function copyMessage(){
  const msg=buildMessage();
  const btn=document.getElementById("copy-btn");
  navigator.clipboard.writeText(msg).then(()=>{
    btn.textContent="✅ COPIED! PASTE INTO WHATSAPP";
    btn.classList.add("copied");
    setTimeout(()=>{btn.textContent="📋 COPY MESSAGE";btn.classList.remove("copied");},2500);
  }).catch(()=>{
    const ta=document.createElement("textarea");
    ta.value=msg;ta.style.cssText="position:fixed;opacity:0";
    document.body.appendChild(ta);ta.focus();ta.select();
    document.execCommand("copy");document.body.removeChild(ta);
    btn.textContent="✅ COPIED!";btn.classList.add("copied");
    setTimeout(()=>{btn.textContent="📋 COPY MESSAGE";btn.classList.remove("copied");},2500);
  });
}
