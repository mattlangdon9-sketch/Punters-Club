<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Punters Club 2026 🏉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0D1B2A;color:#fff;font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#0D1B2A}

/* HEADER */
.header{background:#132233;padding:14px 16px 12px;text-align:center;border-bottom:3px solid #E8751A}
.nrl-badge{display:inline-block;background:#E8751A;color:#fff;font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:11px;letter-spacing:3px;padding:3px 10px;border-radius:3px;margin-bottom:6px}
.header-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:32px;color:#E8751A;letter-spacing:2px;line-height:1}
.header-sub{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:13px;color:#F5A623;letter-spacing:3px;margin-top:3px}
.header-detail{font-size:10px;color:#6B8CA8;margin-top:3px;letter-spacing:1px}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:6px;vertical-align:middle}
.sync-dot.online{background:#2ECC71}
.sync-dot.offline{background:#E74C3C}
.sync-dot.syncing{background:#F5A623;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* NAV */
.nav{display:flex;background:#132233;border-bottom:1px solid #1A2E42;position:sticky;top:0;z-index:100;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:56px;padding:10px 2px;border:none;background:transparent;color:#6B8CA8;font-size:10px;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;letter-spacing:0.5px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.nav-btn.active{background:#E8751A;color:#0D1B2A}

/* PAGE */
.page{padding:14px 14px 90px;display:none}
.page.active{display:block}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#132233;border:1px solid #E8751A;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* LOADING */
.loading{text-align:center;padding:40px 20px;color:#6B8CA8;font-size:14px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #1A2E42;border-top-color:#E8751A;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat-card{background:#1A2E42;border:1.5px solid #E8751A;border-radius:10px;padding:10px 12px}
.stat-label{font-size:9px;font-weight:700;color:#6B8CA8;letter-spacing:1.5px;font-family:‘Barlow Condensed’,sans-serif;text-transform:uppercase;margin-bottom:4px}
.stat-value{font-size:18px;font-weight:800;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:0.5px;line-height:1}

/* TABLE */
.table-wrap{border-radius:10px;overflow:hidden;border:1px solid #1A2E42}
.table-head{background:#132233;padding:8px 10px;display:grid;gap:4px}
.table-head-cell{font-size:10px;font-weight:700;color:#F5A623;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:1px;text-align:center}
.table-row{padding:9px 10px;display:grid;gap:4px;align-items:center;cursor:pointer}
.table-row:nth-child(even){background:#132233}
.table-row:nth-child(odd){background:#1A2E42}

/* WEEK SELECTOR */
.week-selector{background:#132233;border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid #1A2E42}
.week-nav{display:flex;align-items:center;gap:10px}
.week-btn{background:#1A2E42;border:1px solid #E8751A;color:#E8751A;border-radius:8px;width:44px;height:44px;font-size:22px;cursor:pointer;font-weight:700;flex-shrink:0}
.week-num-big{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:40px;color:#F5A623;line-height:1}
.week-date-txt{font-size:12px;color:#6B8CA8;margin-top:2px}
.punter-badge{display:inline-flex;align-items:center;gap:6px;background:#1A2E42;border-radius:20px;padding:5px 14px;margin-top:6px}

/* INPUTS */
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.input-card{background:#132233;border-radius:10px;padding:12px;border:1px solid #1A2E42}
.input-card.bonus{border-color:#F5A623;background:#1C1A00}
.input-name{font-size:10px;font-weight:700;color:#6B8CA8;letter-spacing:1.5px;font-family:‘Barlow Condensed’,sans-serif;text-transform:uppercase;margin-bottom:6px}
.input-name.bonus{color:#F5A623}
.input-wrap{position:relative}
.input-dollar{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#6B8CA8;font-size:14px;font-weight:600;pointer-events:none}
.input-field{background:#0D2A4A;border:2px solid #E8751A;border-radius:8px;color:#fff;font-size:17px;font-family:‘Barlow’,sans-serif;font-weight:600;text-align:center;width:100%;padding:10px 6px 10px 24px;outline:none}
.input-field:focus{border-color:#F5A623;background:#1A3A5A}
.input-field.profit{background:#1A4A2A;border-color:#2ECC71;color:#2ECC71}
.input-field.loss{background:#4A1A1A;border-color:#E74C3C;color:#E74C3C}
.input-pnl{margin-top:4px;font-size:11px;font-weight:600;text-align:center;min-height:16px}

/* RESULT BOX */
.result-box{border-radius:12px;padding:16px;margin-bottom:14px;text-align:center;border:2px solid}
.result-big{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:44px;line-height:1}
.bonus-alert{background:#1C1A00;border:2px solid #F5A623;border-radius:8px;padding:10px 12px;margin-top:8px}

/* LEADERBOARD */
.lb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.lb-card{border-radius:12px;padding:14px;border:2px solid}
.mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-top:8px}
.mini-stat{background:#1A2E42;border-radius:6px;padding:5px 4px;text-align:center}
.mini-stat-label{font-size:8px;color:#6B8CA8;font-weight:700;font-family:‘Barlow Condensed’,sans-serif;text-transform:uppercase}
.mini-stat-value{font-size:12px;font-weight:700;margin-top:1px}

/* PROGRESS */
.progress-wrap{background:#132233;border-radius:99px;height:10px;overflow:hidden;margin:8px 0}
.progress-bar{background:linear-gradient(90deg,#E8751A,#F5A623);height:100%;border-radius:99px;transition:width 0.6s ease}

/* BUTTONS */
.copy-btn{background:#2ECC71;color:#0D1B2A;border:none;border-radius:10px;font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:18px;padding:15px 0;width:100%;cursor:pointer;letter-spacing:1px;margin-bottom:14px}
.copy-btn.copied{background:#F5A623}
.clear-btn{width:100%;padding:12px 0;background:transparent;border:1px solid #1A2E42;border-radius:10px;color:#6B8CA8;font-size:13px;cursor:pointer;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;margin-top:4px}
.save-btn{width:100%;padding:14px 0;background:#E8751A;color:#0D1B2A;border:none;border-radius:10px;font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:18px;cursor:pointer;letter-spacing:1px;margin-bottom:10px}

/* COUNTDOWN */
.countdown-box{background:linear-gradient(135deg,#132233,#1A2E42);border:2px solid #E8751A;border-radius:14px;padding:16px;margin-bottom:10px;text-align:center}
.countdown-num{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:56px;color:#E8751A;line-height:1}

/* HOF */
.hof-box{background:#1C1400;border:2px solid #F5A623;border-radius:14px;padding:16px;margin-bottom:10px}
.hof-win{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:46px;color:#2ECC71;line-height:1}

/* CHART */
.chart-box{background:#132233;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #1A2E42}

/* RULES */
.rule-card{background:#132233;border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid #E8751A}
.rule-num{display:inline-block;background:#E8751A;color:#0D1B2A;font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:13px;width:26px;height:26px;border-radius:50%;text-align:center;line-height:26px;margin-right:8px;flex-shrink:0}
.rule-text{font-size:13px;color:#D9E8F5;line-height:1.5}
.rule-highlight{color:#F5A623;font-weight:700}
.rules-header{background:linear-gradient(135deg,#132233,#1A2E42);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center;border:1px solid #E8751A}

/* WA PREVIEW */
.wa-preview{background:#0A1E0A;border:1.5px solid #2ECC71;border-radius:12px;padding:16px;font-family:monospace;font-size:13px;line-height:1.7;color:#2ECC71;white-space:pre-wrap;word-break:break-word}

/* UTILS */
.profit{color:#2ECC71!important}
.loss{color:#E74C3C!important}
.amber{color:#F5A623}
.muted{color:#6B8CA8}
.divider{height:1px;background:linear-gradient(90deg,transparent,#E8751A44,transparent);margin:14px 0}
.section-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#E8751A;font-size:13px;margin-bottom:10px}
.wk-badge{background:#E8751A;color:#0D1B2A;border-radius:6px;font-weight:900;font-family:‘Barlow Condensed’,sans-serif;width:32px;text-align:center;padding:3px 0;flex-shrink:0;font-size:11px}
.tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.tag-amber{background:#2A1800;color:#F5A623}
.tag-muted{background:#132233;color:#6B8CA8}
.tag-green{background:#1A4A2A;color:#2ECC71}
.tip-box{background:#1A2E42;border-radius:10px;padding:12px;margin-top:12px}
.bonus-box{background:#1A2800;border:1.5px solid #F5A623;border-radius:10px;padding:14px}
</style>

</head>
<body>
<div class="app">
  <div class="header">
    <div class="nrl-badge">NRL PREMIERSHIP 2026</div>
    <div class="header-title">🏉 PUNTERS CLUB</div>
    <div class="header-sub">MAGIC ROUND · BRISBANE 2027</div>
    <div class="header-detail">APR 2026 → MAY 2027 · 56 WEEKS · $200 POOL/WK <span class="sync-dot offline" id="sync-dot"></span></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="showTab('dashboard')">📊 Dash</button>
    <button class="nav-btn" id="nav-entry" onclick="showTab('entry')">📋 Entry</button>
    <button class="nav-btn" id="nav-leaderboard" onclick="showTab('leaderboard')">🏆 Board</button>
    <button class="nav-btn" id="nav-whatsapp" onclick="showTab('whatsapp')">📱 WA</button>
    <button class="nav-btn" id="nav-rules" onclick="showTab('rules')">📜 Rules</button>
    <button class="nav-btn" id="nav-hof" onclick="showTab('hof')">🏆 HOF</button>
    <button class="nav-btn" id="nav-graph" onclick="showTab('graph')">📈 Kitty</button>
  </div>

  <div id="tab-dashboard" class="page active"><div class="loading"><div class="spinner"></div><br>Loading...</div></div>
  <div id="tab-entry" class="page"></div>
  <div id="tab-leaderboard" class="page"><div class="loading"><div class="spinner"></div><br>Loading...</div></div>
  <div id="tab-whatsapp" class="page"></div>
  <div id="tab-rules" class="page"></div>
  <div id="tab-hof" class="page"></div>
  <div id="tab-graph" class="page"></div>

  <div class="toast" id="toast"></div>
</div>

<script>
var SUPABASE_URL = "https://ndsbuovvckxglbgptymc.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kc2J1b3Z2Y2t4Z2xiZ3B0eW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjM4MzMsImV4cCI6MjA5MjUzOTgzM30.dQ6TW7ViK6tFIk7duSf0SENC2BvGzkGaDwgtGnzuzbY";
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var PUNTERS  = ["Matt","Hamish","Sean","Jamie"];
var PCOLS    = ["matt","hamish","sean","jamie"];
var WEEKS    = 56;
var POOL     = 200;
var AUTO_BANK = 200;
var BONUS_TRIGGER = 600;
var BONUS_KEEP    = 200;
var BRISBANE_DATE = new Date("2027-05-21");
var START    = new Date("2026-04-06");
var MEDALS   = ["🥇","🥈","🥉","☠️"];

var DATES = [];
for (var i = 0; i < WEEKS; i++) {
  var d = new Date(START);
  d.setDate(d.getDate() + i * 7);
  DATES.push(d.toLocaleDateString("en-AU", {day:"2-digit", month:"short"}));
}
var ROTATION = [];
for (var i = 0; i < WEEKS; i++) {
  ROTATION.push(PUNTERS[i % 4]);
}

var results = {};
var currentEntryWeek = 1;
var currentWAWeek = 1;
var activeTab = "dashboard";
var kittyChart = null;

// ── SUPABASE ─────────────────────────────────────────────────────
function setSyncStatus(s) {
  var dot = document.getElementById("sync-dot");
  if (dot) dot.className = "sync-dot " + s;
}

function loadFromDB() {
  setSyncStatus("syncing");
  db.from("results").select("*").then(function(res) {
    if (res.error) {
      console.error("DB error:", res.error);
      setSyncStatus("offline");
      showToast("DB error — check Supabase");
      renderActiveTab();
      return;
    }
    results = {};
    (res.data || []).forEach(function(row) {
      results[row.week] = {
        returns: PCOLS.map(function(c) { return (row[c] !== undefined && row[c] !== null) ? row[c] : null; }),
        bonusPunter: (row.bonus_punter !== undefined) ? row.bonus_punter : null,
        bonusReturn: (row.bonus_return !== undefined) ? row.bonus_return : null
      };
    });
    setSyncStatus("online");
    renderActiveTab();
  }).catch(function(e) {
    console.error("Fetch error:", e);
    setSyncStatus("offline");
    showToast("Connection failed");
    renderActiveTab();
  });
}

function saveWeekToDB(week) {
  setSyncStatus("syncing");
  var w = results[week] || {returns:[null,null,null,null], bonusPunter:null, bonusReturn:null};
  var row = {
    week: week,
    matt: w.returns[0], hamish: w.returns[1], sean: w.returns[2], jamie: w.returns[3],
    bonus_punter: w.bonusPunter || null,
    bonus_return: w.bonusReturn || null,
    updated_at: new Date().toISOString()
  };
  db.from("results").upsert(row).then(function(res) {
    if (res.error) throw res.error;
    setSyncStatus("online");
    showToast("✅ Saved & synced!");
  }).catch(function(e) {
    console.error(e);
    setSyncStatus("offline");
    showToast("⚠️ Save failed — check connection");
  });
}

function deleteWeekFromDB(week) {
  db.from("results").delete().eq("week", week).then(function() {
    showToast("🗑️ Week cleared");
  });
}

function subscribeToChanges() {
  db.channel("results-live")
    .on("postgres_changes", {event:"*", schema:"public", table:"results"}, function() {
      loadFromDB();
      showToast("🔄 Updated!");
    }).subscribe();
}

// ── HELPERS ──────────────────────────────────────────────────────
function fmt$(n, sign) {
  if (n === null || n === undefined || n === "") return "—";
  var a = Math.abs(Number(n)).toFixed(2);
  if (sign) return Number(n) >= 0 ? "+$" + a : "-$" + a;
  return "$" + a;
}

function fmtPct(n) {
  return isNaN(n) || n === null ? "—" : Math.round(n * 100) + "%";
}

function isComplete(wk) {
  var w = results[wk];
  if (!w) return false;
  for (var i = 0; i < PUNTERS.length; i++) {
    if (w.returns[i] === null || w.returns[i] === undefined || w.returns[i] === "") return false;
  }
  return true;
}

function calcBanked(wk) {
  if (!isComplete(wk)) return 0;
  var w = results[wk];
  var ret = w.returns.reduce(function(a, b) { return a + Number(b); }, 0);
  var banked = AUTO_BANK + ret;
  if (ret >= BONUS_TRIGGER) banked = AUTO_BANK + ret - BONUS_KEEP;
  if (w.bonusReturn !== null && w.bonusReturn !== undefined && w.bonusReturn !== "") {
    var br = Number(w.bonusReturn);
    if (br >= BONUS_TRIGGER) banked += br - BONUS_KEEP;
    else banked += br;
  }
  return banked;
}

function getTotalBanked() {
  var total = 0;
  for (var i = 1; i <= WEEKS; i++) {
    if (isComplete(i)) total += calcBanked(i);
  }
  return total;
}

function getWeeksPlayed() {
  var count = 0;
  for (var i = 1; i <= WEEKS; i++) {
    if (isComplete(i)) count++;
  }
  return count;
}

function calcStats() {
  return PUNTERS.map(function(name, pi) {
    var weekReturns = [];
    Object.keys(results).forEach(function(wk) {
      if (!isComplete(Number(wk))) return;
      var w = results[wk];
      if (w.returns[pi] !== null && w.returns[pi] !== undefined && w.returns[pi] !== "")
        weekReturns.push({ret: Number(w.returns[pi]), staked: POOL});
      if (w.bonusPunter === name && w.bonusReturn !== null && w.bonusReturn !== undefined && w.bonusReturn !== "")
        weekReturns.push({ret: Number(w.bonusReturn), staked: POOL});
    });
    var weeks = weekReturns.length;
    var staked = weekReturns.reduce(function(a,b) { return a+b.staked; }, 0);
    var totalReturn = weekReturns.reduce(function(a,b) { return a+b.ret; }, 0);
    var pnl = totalReturn - staked;
    var best = weeks ? Math.max.apply(null, weekReturns.map(function(r) { return r.ret - r.staked; })) : 0;
    var wins = weekReturns.filter(function(r) { return r.ret > r.staked; }).length;
    var winRate = weeks ? wins / weeks : 0;
    return {name:name, pi:pi, weeks:weeks, staked:staked, totalReturn:totalReturn, pnl:pnl, best:best, winRate:winRate};
  });
}

function rankStats(stats) {
  var sorted = stats.slice().sort(function(a,b) { return b.pnl - a.pnl; });
  return stats.map(function(s) {
    return Object.assign({}, s, {rank: sorted.findIndex(function(x) { return x.name === s.name; }) + 1});
  });
}

function getDaysTo() {
  var diff = BRISBANE_DATE - new Date();
  return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
}

function getBiggestWin() {
  var best = null;
  for (var wk = 1; wk <= WEEKS; wk++) {
    if (!isComplete(wk)) continue;
    var w = results[wk];
    PUNTERS.forEach(function(name, pi) {
      var val = w.returns[pi];
      if (val === null || val === undefined || val === "") return;
      var profit = Number(val) - POOL;
      if (best === null || profit > best.profit)
        best = {profit:profit, ret:Number(val), name:name, week:wk, date:DATES[wk-1], isBonus:false};
    });
    if (w.bonusPunter && w.bonusReturn !== null && w.bonusReturn !== undefined && w.bonusReturn !== "") {
      var profit = Number(w.bonusReturn) - POOL;
      if (best === null || profit > best.profit)
        best = {profit:profit, ret:Number(w.bonusReturn), name:w.bonusPunter, week:wk, date:DATES[wk-1], isBonus:true};
    }
  }
  return best;
}

function getKittyHistory() {
  var cumulative = 0;
  var history = [];
  for (var wk = 1; wk <= WEEKS; wk++) {
    if (!isComplete(wk)) continue;
    cumulative += calcBanked(wk);
    history.push({week:wk, amount:Math.round(cumulative), label:"Wk "+wk});
  }
  return history;
}

function getCurrentBonusPunter() {
  var lastWk = 0;
  for (var i = 1; i <= WEEKS; i++) { if (isComplete(i)) lastWk = i; }
  if (!lastWk) return null;
  var w = results[lastWk];
  var ret = w.returns.reduce(function(a,b) { return a+Number(b); }, 0);
  if (ret >= BONUS_TRIGGER) return ROTATION[lastWk-1];
  if (w.bonusReturn !== null && Number(w.bonusReturn) >= BONUS_TRIGGER) return w.bonusPunter;
  return null;
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2500);
}

// ── TABS ─────────────────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("active"); });
  document.querySelectorAll(".nav-btn").forEach(function(b) { b.classList.remove("active"); });
  document.getElementById("tab-" + id).classList.add("active");
  document.getElementById("nav-" + id).classList.add("active");
  activeTab = id;
  renderActiveTab();
}

function renderActiveTab() {
  if (activeTab === "dashboard") renderDashboard();
  if (activeTab === "entry") renderEntry();
  if (activeTab === "leaderboard") renderLeaderboard();
  if (activeTab === "whatsapp") renderWhatsApp();
  if (activeTab === "rules") renderRules();
  if (activeTab === "hof") renderHOF();
  if (activeTab === "graph") renderGraph();
}

// ── ENTRY ────────────────────────────────────────────────────────
function renderEntry() {
  var weekData = results[currentEntryWeek] || {returns:[null,null,null,null], bonusPunter:null, bonusReturn:null};
  var expectedBonus = null;
  if (currentEntryWeek > 1) {
    var prev = results[currentEntryWeek - 1];
    if (prev && isComplete(currentEntryWeek - 1)) {
      var prevRet = prev.returns.reduce(function(a,b) { return a+Number(b); }, 0);
      if (prevRet >= BONUS_TRIGGER) expectedBonus = ROTATION[currentEntryWeek - 2];
      else if (prev.bonusReturn !== null && Number(prev.bonusReturn) >= BONUS_TRIGGER) expectedBonus = prev.bonusPunter;
    }
  }
  var complete = isComplete(currentEntryWeek);
  var totalReturn = complete ? weekData.returns.reduce(function(a,b) { return a+Number(b); }, 0) : null;
  var hasBonus = expectedBonus !== null;
  var bonusRet = weekData.bonusReturn;
  var bonusComplete = !hasBonus || (bonusRet !== null && bonusRet !== undefined && bonusRet !== "");
  var allComplete = complete && bonusComplete;
  var bankedThisWeek = allComplete ? calcBanked(currentEntryWeek) : null;

  var html = "";

  // Week selector
  html += '<div class="week-selector">';
  html += '<div class="section-title" style="margin-bottom:10px">Select Week</div>';
  html += '<div class="week-nav">';
  html += '<button class="week-btn" onclick="changeWeek(-1)">‹</button>';
  html += '<div style="flex:1;text-align:center"><div class="week-num-big">WK ' + currentEntryWeek + '</div><div class="week-date-txt">' + DATES[currentEntryWeek-1] + '</div></div>';
  html += '<button class="week-btn" onclick="changeWeek(1)">›</button>';
  html += '</div>';
  html += '<div style="text-align:center"><div class="punter-badge"><span style="font-size:11px;color:#6B8CA8">Punter:</span><span style="font-size:14px;font-weight:700;color:#F5A623;font-family:\'Barlow Condensed\',sans-serif">' + ROTATION[currentEntryWeek-1] + '</span></div>';
  if (hasBonus) {
    html += '<div style="display:inline-flex;align-items:center;gap:6px;background:#1C1A00;border-radius:20px;padding:5px 14px;margin-top:6px;border:1px solid #F5A623"><span style="font-size:11px;color:#F5A623">⚡ Bonus:</span><span style="font-size:14px;font-weight:700;color:#F5A623;font-family:\'Barlow Condensed\',sans-serif">' + expectedBonus + '</span></div>';
  }
  html += '</div></div>';

  // Input grid
  html += '<div class="section-title">💰 Returns ($200 bet → how much returned?)</div>';
  html += '<div class="input-grid">';
  PUNTERS.forEach(function(name, pi) {
    var val = weekData.returns[pi];
    var hasVal = val !== null && val !== undefined && val !== "";
    var isP = hasVal && Number(val) > POOL;
    html += '<div class="input-card">';
    html += '<div class="input-name">' + name + '</div>';
    html += '<div class="input-wrap"><span class="input-dollar">$</span>';
    html += '<input type="number" class="input-field ' + (hasVal ? (isP ? "profit" : "loss") : "") + '" id="input-' + pi + '" placeholder="0.00" value="' + (hasVal ? Number(val) : "") + '" step="0.01" min="0" inputmode="decimal" oninput="updateVal(' + pi + ',this.value)">';
    html += '</div>';
    html += '<div class="input-pnl ' + (hasVal ? (isP ? "profit" : "loss") : "") + '" id="pnl-' + pi + '">' + (hasVal ? (isP ? "+$" + (Number(val)-POOL).toFixed(2) + " ✅" : "-$" + (POOL-Number(val)).toFixed(2) + " ❌") : "") + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Bonus input
  if (hasBonus) {
    var bHasVal = bonusRet !== null && bonusRet !== undefined && bonusRet !== "";
    var bIsP = bHasVal && Number(bonusRet) > POOL;
    html += '<div class="section-title">⚡ Bonus Return (' + expectedBonus + ' — $200 bet)</div>';
    html += '<div style="margin-bottom:14px"><div class="input-card bonus">';
    html += '<div class="input-name bonus">⚡ ' + expectedBonus + ' BONUS BET</div>';
    html += '<div class="input-wrap"><span class="input-dollar">$</span>';
    html += '<input type="number" class="input-field ' + (bHasVal ? (bIsP ? "profit" : "loss") : "") + '" id="input-bonus" placeholder="0.00" value="' + (bHasVal ? Number(bonusRet) : "") + '" step="0.01" min="0" inputmode="decimal" oninput="updateBonusVal(this.value,\'' + expectedBonus + '\')">';
    html += '</div>';
    html += '<div class="input-pnl ' + (bHasVal ? (bIsP ? "profit" : "loss") : "") + '" id="pnl-bonus">' + (bHasVal ? (bIsP ? "+$" + (Number(bonusRet)-POOL).toFixed(2) + " ✅" : "-$" + (POOL-Number(bonusRet)).toFixed(2) + " ❌") : "") + '</div>';
    html += '</div></div>';
  }

  // Result box
  if (allComplete && bankedThisWeek !== null) {
    html += '<div class="result-box" style="background:' + (bankedThisWeek > AUTO_BANK ? "#1A4A2A" : "#1A2E42") + ';border-color:' + (bankedThisWeek > AUTO_BANK ? "#2ECC71" : "#E8751A") + '">';
    html += '<div style="font-size:11px;font-weight:600;letter-spacing:1px;color:#6B8CA8;margin-bottom:4px">WEEK ' + currentEntryWeek + ' — TRIP KITTY</div>';
    html += '<div class="result-big profit">$' + Math.round(bankedThisWeek).toLocaleString() + '</div>';
    html += '<div style="font-size:12px;margin-top:4px;color:#6B8CA8">banked this week</div>';
    html += '<div style="display:flex;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap"><span class="tag tag-muted">$200 guaranteed</span>';
    if (bankedThisWeek > AUTO_BANK) html += '<span class="tag tag-green">+$' + Math.round(bankedThisWeek - AUTO_BANK).toLocaleString() + ' winnings</span>';
    html += '</div>';
    if (totalReturn >= BONUS_TRIGGER) {
      html += '<div class="bonus-alert"><div style="color:#F5A623;font-weight:800;font-size:14px;font-family:\'Barlow Condensed\',sans-serif">⚡ BONUS TRIGGERED!</div><div style="color:#D9E8F5;font-size:11px;margin-top:2px">' + ROTATION[currentEntryWeek-1] + ' bets again next week!</div></div>';
    }
    if (hasBonus && bonusRet !== null && Number(bonusRet) >= BONUS_TRIGGER) {
      html += '<div class="bonus-alert" style="margin-top:6px"><div style="color:#F5A623;font-weight:800;font-size:14px;font-family:\'Barlow Condensed\',sans-serif">⚡ BONUS CONTINUES!</div><div style="color:#D9E8F5;font-size:11px;margin-top:2px">' + expectedBonus + ' bets AGAIN next week!</div></div>';
    }
    html += '</div>';
  }

  html += '<button class="save-btn" onclick="saveWeek()">💾 SAVE WEEK ' + currentEntryWeek + '</button>';
  html += '<button class="clear-btn" onclick="clearWeek()">Clear Week ' + currentEntryWeek + '</button>';

  // Overview
  html += '<div class="divider"></div><div class="section-title">Season Overview</div>';
  html += '<div class="table-wrap"><div class="table-head" style="grid-template-columns:28px 48px 1fr 60px 62px">';
  html += '<div class="table-head-cell">WK</div><div class="table-head-cell">DATE</div><div class="table-head-cell" style="text-align:left">WHO</div><div class="table-head-cell">RETURN</div><div class="table-head-cell">BANKED</div>';
  html += '</div>';
  for (var wk = 1; wk <= WEEKS; wk++) {
    var w = results[wk];
    var comp = isComplete(wk);
    var ret = comp ? results[wk].returns.reduce(function(a,b) { return a+Number(b); }, 0) : null;
    var banked = comp ? calcBanked(wk) : null;
    var isCur = wk === currentEntryWeek;
    html += '<div class="table-row" onclick="jumpToWeek(' + wk + ')" style="grid-template-columns:28px 48px 1fr 60px 62px;' + (isCur ? "outline:2px solid #E8751A;outline-offset:-2px;" : "") + '">';
    html += '<div class="wk-badge">' + wk + '</div>';
    html += '<div style="font-size:10px;color:#D9E8F5;text-align:center">' + DATES[wk-1] + '</div>';
    html += '<div style="font-size:11px;font-weight:600;color:' + (isCur ? "#F5A623" : "#D9E8F5") + '">' + ROTATION[wk-1] + '</div>';
    html += '<div style="font-size:11px;text-align:center">' + (ret !== null ? fmt$(ret) : "—") + '</div>';
    html += '<div style="font-size:12px;font-weight:700;text-align:center' + (banked !== null ? ';color:#2ECC71" class="profit"' : '"') + '>' + (banked !== null ? "$" + Math.round(banked).toLocaleString() : "—") + '</div>';
    html += '</div>';
  }
  html += '</div>';

  document.getElementById("tab-entry").innerHTML = html;
}

function updateVal(pi, val) {
  if (!results[currentEntryWeek]) results[currentEntryWeek] = {returns:[null,null,null,null], bonusPunter:null, bonusReturn:null};
  results[currentEntryWeek].returns[pi] = val === "" ? null : Number(val);
  var input = document.getElementById("input-" + pi);
  var pnlEl = document.getElementById("pnl-" + pi);
  var hasVal = val !== "";
  var isP = hasVal && Number(val) > POOL;
  if (input) input.className = "input-field " + (hasVal ? (isP ? "profit" : "loss") : "");
  if (pnlEl) {
    pnlEl.className = "input-pnl " + (hasVal ? (isP ? "profit" : "loss") : "");
    pnlEl.textContent = hasVal ? (isP ? "+$" + (Number(val)-POOL).toFixed(2) + " ✅" : "-$" + (POOL-Number(val)).toFixed(2) + " ❌") : "";
  }
}

function updateBonusVal(val, punterName) {
  if (!results[currentEntryWeek]) results[currentEntryWeek] = {returns:[null,null,null,null], bonusPunter:null, bonusReturn:null};
  results[currentEntryWeek].bonusPunter = punterName;
  results[currentEntryWeek].bonusReturn = val === "" ? null : Number(val);
  var input = document.getElementById("input-bonus");
  var pnlEl = document.getElementById("pnl-bonus");
  var hasVal = val !== "";
  var isP = hasVal && Number(val) > POOL;
  if (input) input.className = "input-field " + (hasVal ? (isP ? "profit" : "loss") : "");
  if (pnlEl) {
    pnlEl.className = "input-pnl " + (hasVal ? (isP ? "profit" : "loss") : "");
    pnlEl.textContent = hasVal ? (isP ? "+$" + (Number(val)-POOL).toFixed(2) + " ✅" : "-$" + (POOL-Number(val)).toFixed(2) + " ❌") : "";
  }
}

function saveWeek() { saveWeekToDB(currentEntryWeek); }

function changeWeek(dir) {
  currentEntryWeek = Math.max(1, Math.min(WEEKS, currentEntryWeek + dir));
  renderEntry();
  document.getElementById("tab-entry").scrollTop = 0;
}

function jumpToWeek(wk) {
  currentEntryWeek = wk;
  renderEntry();
  document.getElementById("tab-entry").scrollTop = 0;
}

function clearWeek() {
  delete results[currentEntryWeek];
  deleteWeekFromDB(currentEntryWeek);
  renderEntry();
}

// ── WHATSAPP ─────────────────────────────────────────────────────
function buildMessage() {
  var stats = rankStats(calcStats()).sort(function(a,b) { return a.rank - b.rank; });
  var w = results[currentWAWeek];
  var complete = isComplete(currentWAWeek);
  var totalReturn = complete ? w.returns.reduce(function(a,b) { return a+Number(b); }, 0) : null;
  var banked = complete ? calcBanked(currentWAWeek) : null;
  var totalBanked = getTotalBanked();
  var lines = [
    "🏉 PUNTERS CLUB — WEEK " + currentWAWeek + " 🏉",
    "NRL PREMIERSHIP 2026",
    "━━━━━━━━━━━━━━━━━━",
    "📅 " + DATES[currentWAWeek-1],
    "🎯 Punter: " + ROTATION[currentWAWeek-1]
  ];
  if (w && w.bonusPunter) lines.push("⚡ Bonus: " + w.bonusPunter);
  lines.push("━━━━━━━━━━━━━━━━━━", "💰 RETURNS:");
  PUNTERS.forEach(function(name, i) {
    var val = w ? w.returns[i] : null;
    var hasVal = val !== null && val !== undefined && val !== "";
    lines.push("  " + name + ": " + (hasVal ? "$" + Number(val).toFixed(2) + " " + (Number(val) > POOL ? "✅" : "❌") : "—"));
  });
  if (w && w.bonusPunter && w.bonusReturn !== null && w.bonusReturn !== undefined && w.bonusReturn !== "") {
    lines.push("  ⚡ " + w.bonusPunter + ": $" + Number(w.bonusReturn).toFixed(2) + " " + (Number(w.bonusReturn) > POOL ? "✅" : "❌"));
  }
  lines.push("━━━━━━━━━━━━━━━━━━");
  if (totalReturn !== null) {
    lines.push("📊 Return: $" + totalReturn.toFixed(2));
    lines.push("🎒 Banked this week: $" + Math.round(banked).toLocaleString());
    if (totalReturn >= BONUS_TRIGGER) lines.push("⚡ " + ROTATION[currentWAWeek-1] + " BETS AGAIN next week!");
  }
  lines.push("━━━━━━━━━━━━━━━━━━", "🏆 STANDINGS:");
  stats.forEach(function(s) {
    var pre = s.rank === 4 ? "  ☠️" : "  " + s.rank + ".";
    var p = s.weeks > 0 ? " (" + (s.pnl >= 0 ? "+" : "") + "$" + s.pnl.toFixed(2) + ")" : "";
    lines.push(pre + " " + s.name + p + (s.rank === 4 && s.weeks > 0 ? " 👀" : ""));
  });
  lines.push("━━━━━━━━━━━━━━━━━━");
  lines.push("🎒 Trip kitty: $" + Math.round(totalBanked).toLocaleString());
  lines.push("📆 " + (WEEKS - currentWAWeek) + " weeks to Brisbane! 🍺🏉");
  return lines.join("\n");
}

function renderWhatsApp() {
  var complete = isComplete(currentWAWeek);
  var html = '<div class="week-selector">';
  html += '<div class="section-title" style="margin-bottom:10px">Select Week to Share</div>';
  html += '<div class="week-nav"><button class="week-btn" onclick="changeWAWeek(-1)">‹</button>';
  html += '<div style="flex:1;text-align:center"><div class="week-num-big">WK ' + currentWAWeek + '</div>';
  html += '<div class="week-date-txt">' + (complete ? "✅ Results entered" : "⏳ No results yet") + '</div></div>';
  html += '<button class="week-btn" onclick="changeWAWeek(1)">›</button></div></div>';
  html += '<button class="copy-btn" id="copy-btn" onclick="copyMessage()">📋 COPY MESSAGE</button>';
  html += '<div class="section-title">Message Preview</div>';
  html += '<div class="wa-preview">' + buildMessage() + '</div>';
  html += '<div class="tip-box"><div style="font-size:11px;color:#6B8CA8;line-height:1.5">💡 Enter results → Save → come here → Copy → paste into WhatsApp.</div></div>';
  document.getElementById("tab-whatsapp").innerHTML = html;
}

function changeWAWeek(dir) {
  currentWAWeek = Math.max(1, Math.min(WEEKS, currentWAWeek + dir));
  renderWhatsApp();
}

function copyMessage() {
  var msg = buildMessage();
  var btn = document.getElementById("copy-btn");
  navigator.clipboard.writeText(msg).then(function() {
    btn.textContent = "✅ COPIED! PASTE INTO WHATSAPP";
    btn.classList.add("copied");
    setTimeout(function() { btn.textContent = "📋 COPY MESSAGE"; btn.classList.remove("copied"); }, 2500);
  }).catch(function() {
    var ta = document.createElement("textarea");
    ta.value = msg; ta.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    btn.textContent = "✅ COPIED!"; btn.classList.add("copied");
    setTimeout(function() { btn.textContent = "📋 COPY MESSAGE"; btn.classList.remove("copied"); }, 2500);
  });
}

// ── HALL OF FAME ─────────────────────────────────────────────────
function renderHOF() {
  var best = getBiggestWin();
  var allWins = [];
  for (var wk = 1; wk <= WEEKS; wk++) {
    if (!isComplete(wk)) continue;
    var w = results[wk];
    PUNTERS.forEach(function(name, pi) {
      var val = w.returns[pi];
      if (val === null || val === undefined || val === "") return;
      allWins.push({profit: Number(val)-POOL, ret: Number(val), name: name, week: wk, date: DATES[wk-1], isBonus: false});
    });
    if (w.bonusPunter && w.bonusReturn !== null && w.bonusReturn !== undefined && w.bonusReturn !== "") {
      allWins.push({profit: Number(w.bonusReturn)-POOL, ret: Number(w.bonusReturn), name: w.bonusPunter, week: wk, date: DATES[wk-1], isBonus: true});
    }
  }
  allWins.sort(function(a,b) { return b.profit - a.profit; });
  var top5 = allWins.slice(0, 5);
  var winCounts = {};
  PUNTERS.forEach(function(p) {
    winCounts[p] = allWins.filter(function(w) { return w.profit > 0 && w.name === p; }).length;
  });

  var html = '<div class="rules-header" style="margin-bottom:14px">';
  html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:22px;color:#F5A623;letter-spacing:2px">🏆 HALL OF FAME</div>';
  html += '<div style="font-size:12px;color:#6B8CA8;margin-top:4px">Best single week performances · Season 2026</div></div>';

  if (!best) {
    html += '<div style="background:#132233;border-radius:12px;padding:30px;text-align:center;color:#6B8CA8;font-size:14px">No results yet — someone make history! 🏉</div>';
  } else {
    html += '<div class="hof-box" style="margin-bottom:14px">';
    html += '<div style="font-size:10px;color:#6B8CA8;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">👑 ALL TIME BEST</div>';
    html += '<div style="display:flex;align-items:flex-end;justify-content:space-between">';
    html += '<div><div style="font-size:10px;color:#6B8CA8;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px">profit</div>';
    html += '<div class="hof-win">' + fmt$(best.profit, true) + '</div>';
    html += '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">';
    html += '<span style="background:#2A1800;color:#F5A623;font-family:\'Barlow Condensed\',sans-serif;font-weight:800;font-size:15px;padding:4px 12px;border-radius:20px">' + best.name + '</span>';
    html += '<span style="background:#132233;color:#6B8CA8;font-size:11px;padding:4px 10px;border-radius:20px">Week ' + best.week + ' · ' + best.date + '</span>';
    if (best.isBonus) html += '<span style="background:#1C1A00;color:#F5A623;font-size:10px;font-weight:700;padding:4px 8px;border-radius:20px;border:1px solid #F5A623">⚡ BONUS BET</span>';
    html += '</div></div>';
    html += '<div style="text-align:right"><div style="font-size:10px;color:#6B8CA8;margin-bottom:2px">returned</div>';
    html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:26px;color:#fff">' + fmt$(best.ret) + '</div>';
    html += '<div style="font-size:10px;color:#6B8CA8">from $200 pool</div></div></div></div>';

    html += '<div class="section-title">Top 5 Weeks</div>';
    html += '<div class="table-wrap" style="margin-bottom:14px">';
    html += '<div class="table-head" style="grid-template-columns:28px 1fr 52px 70px 70px">';
    html += '<div class="table-head-cell">#</div><div class="table-head-cell" style="text-align:left">PUNTER</div><div class="table-head-cell">WK</div><div class="table-head-cell">RETURN</div><div class="table-head-cell">PROFIT</div>';
    html += '</div>';

// ── GRAPH ────────────────────────────────────────────────────────
function renderGraph() {
  var history = getKittyHistory();
  var totalBanked = getTotalBanked();
  var wp = getWeeksPlayed();
  var projected = wp > 0 ? Math.round((totalBanked / wp) * WEEKS) : 11200;
  var avg = wp > 0 ? Math.round(totalBanked / wp) : 0;

  var html = '<div class="rules-header" style="margin-bottom:14px">';
  html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:22px;color:#2ECC71;letter-spacing:2px">🎒 TRIP KITTY GROWTH</div>';
  html += '<div style="font-size:12px;color:#6B8CA8;margin-top:4px">Watch that kitty grow week by week</div></div>';

  html += '<div class="stat-grid" style="margin-bottom:14px">';
  html += '<div class="stat-card"><div class="stat-label">TOTAL BANKED</div><div class="stat-value profit">$' + Math.round(totalBanked).toLocaleString() + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">PROJECTED FINAL</div><div class="stat-value amber">$' + projected.toLocaleString() + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">ABOVE MINIMUM</div><div class="stat-value profit">+$' + Math.round(Math.max(0, totalBanked - wp*200)).toLocaleString() + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">AVG PER WEEK</div><div class="stat-value amber">' + (wp > 0 ? "$" + avg.toLocaleString() : "—") + '</div></div>';
  html += '</div>';

  if (history.length === 0) {
    html += '<div style="background:#132233;border-radius:12px;padding:40px;text-align:center;color:#6B8CA8;font-size:14px">No results yet — the kitty starts growing when results are entered!</div>';
  } else {
    html += '<div class="chart-box"><canvas id="kitty-chart" height="200"></canvas>';
    html += '<div style="display:flex;gap:16px;margin-top:10px;justify-content:center">';
    html += '<div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:3px;background:#2ECC71;border-radius:2px"></div><span style="font-size:11px;color:#6B8CA8">Actual kitty</span></div>';
    html += '<div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:3px;background:#E8751A;border-radius:2px;opacity:0.5"></div><span style="font-size:11px;color:#6B8CA8">Guaranteed min</span></div>';
    html += '</div></div>';

    html += '<div class="divider"></div><div class="section-title">Week by Week</div>';
    html += '<div class="table-wrap"><div class="table-head" style="grid-template-columns:32px 55px 1fr 80px 80px">';
    html += '<div class="table-head-cell">WK</div><div class="table-head-cell">DATE</div><div class="table-head-cell" style="text-align:left">PUNTER</div><div class="table-head-cell">BANKED</div><div class="table-head-cell">TOTAL</div>';
    html += '</div>';
    history.forEach(function(h) {
      var wk = h.week;
      var banked = calcBanked(wk);
      var extra = banked - 200;
      html += '<div class="table-row" style="grid-template-columns:32px 55px 1fr 80px 80px">';
      html += '<div class="wk-badge">' + wk + '</div>';
      html += '<div style="font-size:10px;color:#D9E8F5;text-align:center">' + DATES[wk-1] + '</div>';
      html += '<div style="font-size:12px;font-weight:600;color:#F5A623">' + ROTATION[wk-1] + (results[wk] && results[wk].bonusPunter ? " +" + results[wk].bonusPunter : "") + '</div>';
      html += '<div style="font-size:12px;text-align:center;color:#2ECC71">$' + Math.round(banked).toLocaleString() + (extra > 0 ? ' <span style="font-size:9px">(+' + Math.round(extra) + ')</span>' : '') + '</div>';
      html += '<div style="font-size:13px;font-weight:700;text-align:center;color:#F5A623">$' + h.amount.toLocaleString() + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById("tab-graph").innerHTML = html;

  if (history.length > 0) {
    setTimeout(function() {
      var canvas = document.getElementById("kitty-chart");
      if (!canvas) return;
      if (kittyChart) { kittyChart.destroy(); kittyChart = null; }
      var labels = history.map(function(h) { return "Wk " + h.week; });
      var actuals = history.map(function(h) { return h.amount; });
      var minLine = history.map(function(h) { return h.week * 200; });
      kittyChart = new Chart(canvas, {
        type: "line",
        data: {
          labels: labels,

          ]
        },
        options: {
          responsive:true,
          animation:{duration:600},
          plugins:{
            legend:{display:false},
            tooltip:{backgroundColor:"#132233", borderColor:"#E8751A", borderWidth:1, titleColor:"#F5A623", bodyColor:"#D9E8F5",
              callbacks:{label:function(ctx) { return ctx.datasetIndex===0?" Kitty: $"+ctx.parsed.y.toLocaleString():" Min: $"+ctx.parsed.y.toLocaleString(); }}}
          },
          scales:{
            x:{grid:{color:"rgba(255,255,255,0.04)"}, ticks:{color:"#6B8CA8", font:{size:9}, maxTicksLimit:10}},
            y:{grid:{color:"rgba(255,255,255,0.04)"}, ticks:{color:"#6B8CA8", font:{size:9}, callback:function(v) { return "$"+v.toLocaleString(); }}, beginAtZero:true}
          }
        }
      });
    }, 100);
  }
}
